name: Deploy Terrasnack

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Clean Files
        run: |
          rm -rf .git .github node_modules tests
          rm -f package-lock.json
          rm -f vite.config.js tailwind.config.js postcss.config.js
          rm -rf resources/js/ resources/css/

      - name: Upload Without Vendor
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          port: 22
          local_path: ./
          remote_path: /home/${{ secrets.CPANEL_USER }}/terrasnack.biz.id/
          exclude: |
            .git/
            .github/
            node_modules/
            vendor/
            tests/
            *.log
            *.sqlite

      - name: Composer Install on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.CPANEL_USER }}/terrasnack.biz.id/
            composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Laravel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.CPANEL_USER }}/terrasnack.biz.id/

            # Update .env
            cat > .env << 'EOL'
APP_NAME="Terrasnack"
APP_ENV=production
APP_KEY=${{ secrets.APP_KEY }}
APP_DEBUG=false
APP_URL=${{ secrets.APP_URL }}

DB_CONNECTION=mysql
DB_HOST=127.0.0.1
DB_PORT=3306
DB_DATABASE=${{ secrets.DB_DATABASE }}
DB_USERNAME=${{ secrets.DB_USERNAME }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}

BROADCAST_DRIVER=log
CACHE_DRIVER=file
FILESYSTEM_DISK=local
QUEUE_CONNECTION=sync
SESSION_DRIVER=file
SESSION_LIFETIME=120
EOL

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link

            echo "Skipping database migration for now"
            # php artisan migrate --force