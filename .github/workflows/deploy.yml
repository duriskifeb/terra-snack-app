name: Deploy Terrasnack

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Clean unnecessary files
        run: |
          rm -rf .git .github node_modules tests
          rm -f package-lock.json vite.config.js tailwind.config.js postcss.config.js

      - name: Upload Laravel Core (outside public_html)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          port: 64000
          local_path: ./            # Root of Laravel project
          remote_path: /home/${{ secrets.CPANEL_USER }}/laravel-app
          exclude: |
            public/
            node_modules/
            vendor/
            .git/
            .github/
            tests/
            *.log
            *.sqlite

      - name: Upload Public Folder to public_html
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          port: 64000
          local_path: ./public/
          remote_path: /home/${{ secrets.CPANEL_USER }}/public_html

      - name: SSH:Composer Install
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 64000
          script: |
            cd /home/${{ secrets.CPANEL_USER }}/laravel-app
            composer install --no-dev --optimize-autoloader --no-interaction

      - name: SSH: Setup Laravel & Patch index.php
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 64000
          script: |
            cd /home/${{ secrets.CPANEL_USER }}/laravel-app

            # Create .env file
            echo "APP_NAME=\"Terrasnack\"" > .env
            echo "APP_ENV=production" >> .env
            echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=${{ secrets.APP_URL }}" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=127.0.0.1" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "BROADCAST_DRIVER=log" >> .env
            echo "CACHE_DRIVER=file" >> .env
            echo "FILESYSTEM_DISK=local" >> .env
            echo "QUEUE_CONNECTION=sync" >> .env
            echo "SESSION_DRIVER=file" >> .env
            echo "SESSION_LIFETIME=120" >> .env

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link

            # Patch public_html/index.php to point to laravel-app
            INDEX_FILE="/home/${{ secrets.CPANEL_USER }}/public_html/index.php"
            sed -i "s|require __DIR__.'/../vendor/autoload.php';|require __DIR__.'/../laravel-app/vendor/autoload.php';|" $INDEX_FILE
            sed -i "s|\$app = require_once __DIR__.'/../bootstrap/app.php';|\$app = require_once __DIR__.'/../laravel-app/bootstrap/app.php';|" $INDEX_FILE

            echo "Laravel setup complete and index.php patched"
